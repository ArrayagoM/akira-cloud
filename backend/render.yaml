services:
  - type: web
    name: akira-cloud-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend

    # ── Build ───────────────────────────────────────────────────
    # Baileys usa WebSocket puro — no necesita Chrome ni Puppeteer.
    buildCommand: npm install

    startCommand: npm start

    # ── Variables de entorno ─────────────────────────────────────
    # Completar los valores secretos en el panel de Render:
    # Environment → Add Environment Variable
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: WA_SESSIONS_PATH
        value: /tmp/sessions
      # ── Completar manualmente en el panel de Render: ──────────
      # MONGO_URI
      # JWT_SECRET
      # ENCRYPTION_KEY          (mín. 32 chars — misma que en worker/.env)
      # WORKER_SECRET           (misma que en worker/.env)
      # FRONTEND_URL            (URL de Vercel)
      # BACKEND_URL             (https://akira-cloud.onrender.com)
      # ADMIN_EMAIL
      # ADMIN_PASSWORD
      # ADMIN_NOMBRE
      # MP_PLATFORM_ACCESS_TOKEN
      # MP_PLATFORM_WEBHOOK_SECRET
      # GOOGLE_CLIENT_ID        (si usás OAuth Google)
      # GOOGLE_CLIENT_SECRET    (si usás OAuth Google)
