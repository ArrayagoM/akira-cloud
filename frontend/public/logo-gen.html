<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; display: flex; align-items: center; justify-content: center; width: 512px; height: 512px; overflow: hidden; }
  .logo {
    width: 512px; height: 512px;
    background: #0d1117;
    border-radius: 96px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
</style>
</head>
<body>
<div class="logo">
  <svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Glow effect -->
    <defs>
      <radialGradient id="glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#00e87b" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#00e87b" stop-opacity="0"/>
      </radialGradient>
      <filter id="blur">
        <feGaussianBlur stdDeviation="12"/>
      </filter>
    </defs>
    <!-- Background glow -->
    <circle cx="160" cy="150" r="120" fill="url(#glow)" filter="url(#blur)"/>
    <!-- Chat bubble outer -->
    <rect x="60" y="60" width="200" height="160" rx="28" fill="#00e87b" opacity="0.12"/>
    <rect x="60" y="60" width="200" height="160" rx="28" stroke="#00e87b" stroke-width="2.5" fill="none" opacity="0.5"/>
    <!-- Chat bubble main -->
    <rect x="68" y="68" width="184" height="144" rx="22" fill="#00e87b" opacity="0.08"/>
    <!-- Tail del bubble -->
    <path d="M 100 220 L 85 248 L 128 220 Z" fill="#00e87b" opacity="0.5"/>
    <path d="M 100 220 L 85 248 L 128 220 Z" stroke="#00e87b" stroke-width="2" fill="none" opacity="0.4"/>
    <!-- Líneas de texto simuladas -->
    <rect x="96" y="108" width="80" height="8" rx="4" fill="#00e87b" opacity="0.9"/>
    <rect x="96" y="126" width="128" height="8" rx="4" fill="#00e87b" opacity="0.6"/>
    <rect x="96" y="144" width="96" height="8" rx="4" fill="#00e87b" opacity="0.4"/>
    <!-- Punto IA arriba derecha -->
    <circle cx="240" cy="80" r="20" fill="#0d1117" stroke="#00e87b" stroke-width="2"/>
    <circle cx="240" cy="80" r="8" fill="#00e87b"/>
    <!-- Texto AKIRA -->
    <text x="160" y="295" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="48" fill="#ffffff" text-anchor="middle" letter-spacing="6">AKIRA</text>
    <!-- Punto verde decorativo -->
    <circle cx="258" cy="285" r="5" fill="#00e87b"/>
  </svg>
</div>
</body>
</html>
