  <!-- ── Schema.org / Rich Snippets ───────────────────────── -->
  <script type="application/ld+json">

    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Akira Cloud",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Web",

  <link rel="preconnect" href="https://avatars.githubusercontent.com" crossorigin />

  />

  <!-- ── Links legales (verificador de Google OAuth) ───────── -->

       para que Google verifique la marca al aprobar la pantalla de consentimiento. -->

  <link rel="terms-of-service" href="https://akiracloud.lat/terminos" />
</head>
<body>
  <div id="root"></div>

  <!--
    Footer estático SEO/legal — visible para crawlers que no ejecutan JS
    (incluido el verificador de Google OAuth, que escanea la home buscando
    un link a la política de privacidad antes de aprobar la marca).
    Se oculta en pantalla con `hidden` apenas React monta sobre #root.
    React-Router lo intercepta cuando un usuario real hace click.
  -->
  <noscript>
    <footer>
      <p>Akira Cloud — Bot de WhatsApp con IA para tu negocio.</p>
      <ul>
        <li><a href="/privacidad">Política de Privacidad</a></li>

      </ul>
    </footer>
  </noscript>
  <footer id="legal-footer-seo" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);">
    <a href="/privacidad" rel="privacy-policy">Política de Privacidad</a>
    <a href="/terminos" rel="terms-of-service">Términos del Servicio</a>
  </footer>

  <script type="module" src="/src/main.jsx"></script>
</body>
